name: Fetch AI News
on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次
  workflow_dispatch:      # 允许手动触发

# 核心：必须授予写入权限，否则推送会报 403
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Fetch News Data
        run: node scripts/fetch-news.js
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 检查文件是否有变化
          if git diff --quiet public/data/news.json; then
            echo "No changes in news data. Skipping commit."
          else
            git add public/data/news.json
            git commit -m "chore: auto-update news flash [skip ci]"
            git push origin main
          fi
